name: Generate Snake

on:
  schedule:
    # 매일 자정(00:00 KST)마다 실행
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 이 권한이 있어야 이미지를 네 레포에 저장함
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 깃허브 잔디밭 데이터를 SVG 애니메이션으로 변환하는 핵심 액션
      - name: Generate Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: hkimw-underground
          outputs: |
            github-contribution-grid-snake.svg
            github-contribution-grid-snake-dark.svg?palette=github-dark

      # 생성된 SVG 파일을 'output' 브랜치에 저장
      - name: Deploy to output branch
        uses: crazy-max/github-action-push@v3
        with:
          target_branch: output
          build_dir: .
          message: "Update Contribution Snake"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
